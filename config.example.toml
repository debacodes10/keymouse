# Keymouse configuration example
# Copy this to ~/.config/keymouse/config.toml and edit values.

# Cursor movement keys (single key names)
movement_up = "k"
movement_down = "j"
movement_left = "h"
movement_right = "l"

# Scroll keys
scroll_up = "u"
scroll_down = "n"
scroll_left = "b"
scroll_right = "m"

# Grid mode controls
grid_key = ";"
confirm_key = "enter"

# Mouse click keys
left_click = "f"
right_click = "d"
drag_toggle = "v" # Toggle left-button hold for drag (press again to release)

# Movement speed modifiers
# Supported values: "shift", "option" (or "alt")
fast_modifier = "shift"
slow_modifier = "option"
