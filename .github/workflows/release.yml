name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            bin: keymouse
            asset_name: keymouse-macos-arm64
          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            bin: keymouse
            asset_name: keymouse-macos-x86_64
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: keymouse.exe
            asset_name: keymouse-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}
          zip -j ${{ matrix.asset_name }}.zip ${{ matrix.asset_name }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" "${{ matrix.asset_name }}"
          Compress-Archive -Path "${{ matrix.asset_name }}" -DestinationPath "${{ matrix.asset_name }}.zip"

      - name: Upload artifacts for release job
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: "*.zip"

  release:
    name: Create/Update GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.zip
          generate_release_notes: true
